<mat-toolbar class="shadow">Admin Dashboard</mat-toolbar>
<div class="p-4">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="bg-white rounded-lg shadow p-4">
      <h3 class="text-lg font-semibold mb-2">User Management</h3>
      <p class="text-gray-600 mb-4">
        View and manage all registered users, assign roles, and handle
        permissions.
      </p>
      <button
        class="px-4 py-2 bg-primary text-white rounded hover:bg-primary-dark transition-colors"
      >
        Manage Users
      </button>
    </div>

    <div class="bg-white rounded-lg shadow p-4">
      <h3 class="text-lg font-semibold mb-2">Analytics</h3>
      <p class="text-gray-600 mb-4">
        View detailed analytics about user activity, system performance, and
        more.
      </p>
      <button
        class="px-4 py-2 bg-primary text-white rounded hover:bg-primary-dark transition-colors"
      >
        View Analytics
      </button>
    </div>

    <div class="bg-white rounded-lg shadow p-4">
      <h3 class="text-lg font-semibold mb-2">System Settings</h3>
      <p class="text-gray-600 mb-4">
        Configure system settings, manage integrations, and customize your
        experience.
      </p>
      <button
        class="px-4 py-2 bg-primary text-white rounded hover:bg-primary-dark transition-colors"
      >
        Configure Settings
      </button>
    </div>
  </div>
</div>
