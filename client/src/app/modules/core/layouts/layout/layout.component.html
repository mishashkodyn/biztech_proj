<div class="flex flex-col h-[100dvh] w-full overflow-hidden bg-gray-100">
  <aside
    class="fixed z-[60] h-full w-full md:w-72 bg-white shadow-2xl transition-transform duration-300 ease-in-out"
    [class.-translate-x-full]="!sidebarService.sideBarOpen()"
  >
    <app-sidebar class="h-[100dvh]"></app-sidebar>
  </aside>

  <header
    class="fixed top-0 left-0 w-full z-50 bg-white transition-transform duration-300 pt-[env(safe-area-inset-top)]"
    [class.-translate-y-full]="hidden"
  >
    <app-header></app-header>
  </header>

  <div class="flex flex-col h-[100dvh] w-full overflow-hidden bg-white">
    <main
      class="min-h-[100dvh] box-border bg-white transition-[padding] duration-300 ease-in-out overscroll-none"
      [class.pt-13]="!hidden"
      [class.pt-0]="hidden"
    >
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
